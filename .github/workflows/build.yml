name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android platform files if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Bump compileSdk/targetSdk to 36 (app module)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i -E '/^[[:space:]]*compileSdk\b/ s/.*/    compileSdk = 36/' android/app/build.gradle.kts
            sed -i -E '/^[[:space:]]*targetSdk\b/ s/.*/        targetSdk = 36/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i -E '/^[[:space:]]*compileSdkVersion\b/ s/.*/    compileSdkVersion 36/' android/app/build.gradle
            sed -i -E '/^[[:space:]]*targetSdkVersion\b/ s/.*/        targetSdkVersion 36/' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Patch file_picker's own compileSdk in pub cache
        run: |
          PICKER_DIR=$(find "$HOME/.pub-cache/hosted" -maxdepth 2 -iname "file_picker-*" -type d | head -n 1)
          echo "file_picker package found at: $PICKER_DIR"

          for GRADLE_FILE in "$PICKER_DIR/android/build.gradle.kts" "$PICKER_DIR/android/build.gradle"; do
            if [ -f "$GRADLE_FILE" ]; then
              echo "--- before patch: $GRADLE_FILE ---"
              grep -iE 'compileSdk' "$GRADLE_FILE" || echo "(no compileSdk line found)"

              sed -i -E 's/compileSdk(Version)?[[:space:]]*=?[[:space:]]*\(?[0-9]+\)?/compileSdk 36/g' "$GRADLE_FILE"

              echo "--- after patch: $GRADLE_FILE ---"
              grep -iE 'compileSdk' "$GRADLE_FILE" || echo "(no compileSdk line found)"
            fi
          done

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: elice-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
