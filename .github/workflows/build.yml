name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android platform files if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Bump compileSdk/targetSdk to 36 (app module)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i -E '/^[[:space:]]*compileSdk\b/ s/.*/    compileSdk = 36/' android/app/build.gradle.kts
            sed -i -E '/^[[:space:]]*targetSdk\b/ s/.*/        targetSdk = 36/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i -E '/^[[:space:]]*compileSdkVersion\b/ s/.*/    compileSdkVersion 36/' android/app/build.gradle
            sed -i -E '/^[[:space:]]*targetSdkVersion\b/ s/.*/        targetSdkVersion 36/' android/app/build.gradle
          fi

      - name: Force compileSdk 36 for all plugin modules (root project)
        run: |
          if [ -f android/build.gradle.kts ]; then
            {
              echo ""
              echo "subprojects {"
              echo "    afterEvaluate {"
              echo "        extensions.findByType<com.android.build.gradle.BaseExtension>()?.let { ext ->"
              echo "            ext.compileSdkVersion(36)"
              echo "        }"
              echo "    }"
              echo "}"
            } >> android/build.gradle.kts
          fi
          if [ -f android/build.gradle ]; then
            {
              echo ""
              echo "subprojects {"
              echo "    afterEvaluate { project ->"
              echo "        if (project.hasProperty(\"android\")) {"
              echo "            project.android {"
              echo "                compileSdkVersion 36"
              echo "            }"
              echo "        }"
              echo "    }"
              echo "}"
            } >> android/build.gradle
          fi

      - name: Show resulting SDK config (debug)
        run: |
          echo "--- root build.gradle.kts tail ---"
          [ -f android/build.gradle.kts ] && tail -20 android/build.gradle.kts || true
          echo "--- root build.gradle tail ---"
          [ -f android/build.gradle ] && tail -20 android/build.gradle || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: elice-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
